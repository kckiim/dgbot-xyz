<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>dgbot.xyz</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0a0a;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
    .logo{font-size:2.5rem;font-weight:800;letter-spacing:-.03em;margin-bottom:.5rem}
    .logo span{color:#3b82f6}
    .tagline{color:#6b7280;font-size:.9rem;margin-bottom:3rem}
    .tools{display:flex;flex-direction:column;gap:.75rem;width:100%;max-width:400px}
    .tool{display:flex;align-items:center;justify-content:space-between;background:#111;border:1px solid #1f2937;border-radius:12px;padding:1rem 1.25rem;text-decoration:none;color:#e5e7eb;transition:border-color .2s,background .2s}
    .tool:hover{border-color:#3b82f6;background:#0f1929}
    .tool-left{display:flex;align-items:center;gap:.75rem}
    .tool-icon{font-size:1.25rem}
    .tool-name{font-weight:600;font-size:.9rem}
    .tool-desc{font-size:.75rem;color:#6b7280;margin-top:.15rem}
    .arrow{color:#4b5563;font-size:.85rem}
    .footer{margin-top:3rem;color:#374151;font-size:.75rem}
  </style>
</head>
<body>
  <div class="logo">dg<span>bot</span>.xyz</div>
  <p class="tagline">Research tools & dashboards</p>

  <div class="tools">
    <a href="/dashboard" class="tool">
      <div class="tool-left">
        <span class="tool-icon">📺</span>
        <div>
          <div class="tool-name">YouTube Niche Research</div>
          <div class="tool-desc">33 channels · 7 niches · under 18 months old</div>
        </div>
      </div>
      <span class="arrow">→</span>
    </a>
    <!-- More tools coming soon -->
  </div>

  <div class="footer">Built by K.T. Infinity · 2026</div>
</body>
</html>
